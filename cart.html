<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | Naveera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --premium-gold: #b76e79; 
            --gold-accent: #b8860b;
            --text-dark: #222;
            --bg-soft: #fdfaf7;
        }

        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; color: var(--text-dark); line-height: 1.6; }
        h1, h2, .logo-bold { font-family: 'Playfair Display', serif; }

        /* --- BRAND IDENTITY --- */
        .brand-identity { text-align: center; padding: 20px 0; background: #fff; border-bottom: 1px solid #eee; }
        .logo-bold { font-size: 36px; font-weight: 700; letter-spacing: 5px; color: #000; display: block; line-height: 1; text-transform: uppercase; text-decoration: none; }
        .logo-fashion { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; letter-spacing: 8px; text-transform: uppercase; color: var(--gold-accent); margin-top: 5px; display: block; }

        .cart-container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        
        .cart-header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: baseline; }
        .cart-header h2 { font-size: 32px; margin: 0; font-weight: 400; }
        .cart-header span { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        .cart-item { display: flex; align-items: center; gap: 25px; padding: 25px 0; border-bottom: 1px solid #f9f9f9; transition: 0.3s; }
        .cart-item:hover { background: #fdfafb; }
        
        .cart-item img { width: 100px; height: 130px; object-fit: cover; border-radius: 0; background: #f5f5f5; }
        
        .item-details { flex: 1; }
        .item-details h4 { margin: 0 0 8px 0; font-size: 16px; font-weight: 500; letter-spacing: 0.5px; color: #333; }
        .item-price { color: var(--premium-gold); font-weight: 600; font-size: 15px; }
        
        .remove-btn { color: #ccc; cursor: pointer; font-size: 16px; transition: 0.3s; padding: 10px; }
        .remove-btn:hover { color: #ff4d4d; }

        .cart-summary { margin-top: 40px; padding-top: 20px; border-top: 2px solid #222; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .total-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .cart-total { font-size: 24px; font-weight: 700; color: #000; font-family: 'Playfair Display', serif; }
        
        .checkout-btn { 
            width: 100%; padding: 18px; background: #1a1a1a; color: white; border: none; 
            border-radius: 0; font-weight: 600; cursor: pointer; font-size: 13px; 
            letter-spacing: 3px; text-transform: uppercase; transition: 0.4s; 
        }
        .checkout-btn:hover { background: var(--premium-gold); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .empty-msg { text-align: center; padding: 60px 20px; }
        .empty-msg i { color: #eee; margin-bottom: 20px; }
        .empty-msg p { font-size: 18px; color: #666; font-style: italic; }
        .shop-now-link { 
            display: inline-block; margin-top: 20px; color: var(--premium-gold); 
            text-decoration: none; font-weight: 600; font-size: 13px; letter-spacing: 1px; 
            border-bottom: 1px solid var(--premium-gold); padding-bottom: 2px;
        }

        footer { text-align: center; padding: 40px 20px; margin-top: 40px; border-top: 1px solid #eee; font-size: 12px; color: #999; letter-spacing: 1px; }

        @media (max-width: 600px) {
            .cart-container { margin: 20px 10px; padding: 20px; }
            .cart-item img { width: 70px; height: 90px; }
            .cart-header h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- BRAND LOGO AREA -->
    <header>
        <a href="index.html" style="text-decoration: none;">
            <div class="brand-identity">
                <span class="logo-bold">NAVEERA</span>
                <span class="logo-fashion">Fashion</span>
            </div>
        </a>
    </header>

    <div class="cart-container">
        <div class="cart-header">
            <h2>Shopping Bag</h2>
            <span id="item-count">Your curated selection</span>
        </div>

        <div id="cart-items-list">
            <!-- Items will be injected here -->
        </div>

        <div id="total-area" style="display:none;">
            <div class="cart-summary">
                <div class="total-row">
                    <span class="total-label">Grand Total</span>
                    <div class="cart-total">₹<span id="grand-total">0</span></div>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Secure Checkout</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 NAVEERA BANARAS. CRAFTED WITH HERITAGE.</p>
    </footer>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('naveera_cart')) || [];
            const container = document.getElementById('cart-items-list');
            const totalArea = document.getElementById('total-area');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-msg">
                        <i class="fas fa-shopping-bag fa-4x"></i>
                        <p>Aapka bag khali hai bhai!</p>
                        <a href="index.html" class="shop-now-link">SHOP THE COLLECTION</a>
                    </div>`;
                totalArea.style.display = 'none';
                return;
            }

            totalArea.style.display = 'block';
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += parseInt(item.price);
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <span class="item-price">₹${parseInt(item.price).toLocaleString('en-IN')}</span>
                        </div>
                        <div class="remove-btn" onclick="removeItem(${index})">
                            <i class="fas fa-times"></i>
                        </div>
                    </div>
                `;
            });
            document.getElementById('grand-total').innerText = total.toLocaleString('en-IN');
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('naveera_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('naveera_cart', JSON.stringify(cart));
            displayCart();
        }

        function proceedToCheckout() {
            const cart = JSON.parse(localStorage.getItem('naveera_cart'));
            if(!cart || cart.length === 0) return;
            
            const names = cart.map(i => i.name).join(', ');
            // We get the raw total without formatting for the URL
            const totalRaw = cart.reduce((acc, item) => acc + parseInt(item.price), 0);
            window.location.href = `checkout.html?name=${encodeURIComponent(names)}&price=${totalRaw}`;
        }

        displayCart();
    </script>
</body>
</html>
