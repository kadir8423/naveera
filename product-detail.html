<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Naveera</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin:0; font-family: 'Poppins', sans-serif; background:#fdfdfd; color: #333; overflow-x: hidden; }
        a { text-decoration:none; color:inherit; }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; height: 75px; }
        .logo { font-size: 28px; font-weight: 700; color: #111; letter-spacing: 1px; }

        .product-container { display: flex; max-width: 1200px; margin: 40px auto; gap: 40px; padding: 0 20px; align-items: flex-start; }
        
        /* IMAGE GALLERY SECTION */
        .image-section { flex: 1.1; position: sticky; top: 110px; display: flex; gap: 15px; }
        .thumbnail-col { display: flex; flex-direction: column; gap: 10px; }
        .thumb { width: 70px; height: 90px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .thumb:hover, .thumb.active { border-color: #b76e79; box-shadow: 0 0 10px rgba(183,110,121,0.2); }
        
        .main-display { flex: 1; position: relative; }
        .main-img { 
            width: 100%; border-radius: 15px; background: #f9f9f9; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); object-fit: contain; min-height: 500px; max-height: 650px;
        }

        /* INFO SECTION */
        .info-section { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .brand-tag { color: #b76e79; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
        .p-title { font-size: 30px; font-weight: 700; line-height: 1.2; color: #111; margin: 0; }
        
        .price-box { display: flex; align-items: center; gap: 15px; margin: 10px 0; }
        .p-price { font-size: 32px; font-weight: 700; color: #b76e79; }
        .p-old-price { text-decoration: line-through; color: #aaa; font-size: 20px; }
        .p-discount { background: #fff5f6; color: #b76e79; padding: 4px 10px; border-radius: 4px; font-size: 14px; font-weight: 600; }

        /* KEY FEATURES */
        .features-list { margin: 20px 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .features-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; color: #444; }
        .features-list li i { color: #b76e79; margin-top: 4px; font-size: 16px; }

        /* SPECS TABLE */
        .specs-card { background: #f9f9f9; border-radius: 12px; padding: 20px; margin-top: 10px; border: 1px solid #f0f0f0; }
        .specs-card h4 { margin: 0 0 15px 0; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .specs-table { width: 100%; border-collapse: collapse; }
        .specs-table td { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .specs-table td:first-child { font-weight: 600; color: #777; width: 40%; }
        .specs-table tr:last-child td { border-bottom: none; }

        /* VARIANT BUTTONS */
        .variant-btn {
            padding: 8px 16px; border: 1.5px solid #ddd; background: white; 
            border-radius: 6px; cursor: pointer; font-family: 'Poppins'; 
            font-size: 13px; font-weight: 500; transition: 0.3s;
        }

        /* BUTTONS */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .action-row { display: flex; gap: 15px; }
        .buy-btn { flex: 1.5; background: #222; color: white; padding: 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 18px; border: none; transition: 0.3s; }
        .add-btn { flex: 1; background: white; color: #b76e79; border: 2px solid #b76e79; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .whatsapp-btn { background: #25D366; color: white; padding: 16px; border-radius: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        
        .buy-btn:hover { background: #000; transform: translateY(-2px); }
        .whatsapp-btn:hover { background: #128C7E; }

        .similar-section { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        .similar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
        .s-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .s-card img { width: 100%; height: 320px; object-fit: cover; }
        .s-info { padding: 15px; text-align: center; }

        @media (max-width: 768px) {
            .product-container { flex-direction: column; }
            .image-section { position: relative; top: 0; flex-direction: column-reverse; }
            .thumbnail-col { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .similar-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="logo">Naveera</a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" style="font-weight: 500;">Home</a>
            <i class="fa fa-shopping-bag" style="font-size: 20px; cursor: pointer;" onclick="location.href='cart.html'"></i>
        </div>
    </div>

    <div class="product-container" id="product-details">
        <p style="text-align: center; width: 100%; padding: 50px;">Loading product magic...</p>
    </div>

    <div class="similar-section">
        <h2 style="text-align: center;">You May Also Like</h2>
        <div class="similar-grid" id="similar-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKKtWZYnGOIK4vcKCwaNohBsEGSyXF0iA",
            authDomain: "naveera-e82ab.firebaseapp.com",
            projectId: "naveera-e82ab",
            storageBucket: "naveera-e82ab.firebasestorage.app",
            messagingSenderId: "531422327110",
            appId: "1:531422327110:web:90d3092ec932fbb3643547"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global state for variation
        window.selectedVariant = null;

        window.changeImg = function(url, el) {
            document.getElementById('mainDisplayImg').src = url;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        window.addToCart = function(p) {
            let cart = JSON.parse(localStorage.getItem('naveera_cart')) || [];
            // Agar variant select hai to use object mein add karlo
            if(window.selectedVariant) {
                p.variant = window.selectedVariant;
            }
            cart.push(p);
            localStorage.setItem('naveera_cart', JSON.stringify(cart));
            alert(`Bag mein add ho gaya! ✅ ${window.selectedVariant ? '('+window.selectedVariant+')' : ''}`);
        };

        async function getProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            const snap = await getDoc(doc(db, "products", id));

            if (snap.exists()) {
                const p = snap.data();
                const images = p.images || [p.image];
                let thumbsHtml = images.map((img, i) => `
                    <img src="${img}" class="thumb ${i===0?'active':''}" onclick="changeImg('${img}', this)">
                `).join('');

                let bulletHtml = p.features ? p.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('') : "<li>Authentic Banarasi Handloom Piece</li>";

                const waNumber = "6386885929";
                const waMsg = `Hello Naveera, I'm interested in: ${p.name}. \nLink: ${window.location.href}`;
                const waLink = `https://wa.me/${waNumber}?text=${encodeURIComponent(waMsg)}`;

                document.getElementById('product-details').innerHTML = `
                    <div class="image-section">
                        <div class="thumbnail-col">${thumbsHtml}</div>
                        <div class="main-display">
                            <img src="${images[0]}" id="mainDisplayImg" class="main-img">
                        </div>
                    </div>

                    <div class="info-section">
                        <span class="brand-tag">Premium Collection</span>
                        <h1 class="p-title">${p.name}</h1>
                        
                        <div class="price-box">
                            <span class="p-price" id="mainPrice">₹${p.price}</span>
                            ${p.oldPrice ? `<span class="p-old-price">₹${p.oldPrice}</span>` : ""}
                            ${p.oldPrice ? `<span class="p-discount">${Math.round(((p.oldPrice-p.price)/p.oldPrice)*100)}% OFF</span>` : ""}
                        </div>

                        <div id="variation-wrapper" style="display:none; margin: 10px 0;">
                            <p style="font-weight:600; font-size:14px; margin-bottom:10px;">Select Colour / Variant:</p>
                            <div id="variant-list" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
                        </div>

                        <ul class="features-list">${bulletHtml}</ul>

                        <div class="specs-card">
                            <h4><i class="fas fa-info-circle" style="color:#b76e79"></i> Product Specifications</h4>
                            <table class="specs-table">
                                <tr><td>Fabric Type</td><td>${p.category === 'Saree' ? 'Pure Banarasi Silk' : 'Premium Banarasi Cotton'}</td></tr>
                                <tr><td>Work</td><td>Heavy Hand Embroidery</td></tr>
                                <tr><td>Shipping</td><td>Free Delivery Across India</td></tr>
                            </table>
                        </div>

                        <div class="btn-group">
                            <div class="action-row">
                                <button class="buy-btn" onclick="location.href='checkout.html?id=${id}'">BUY IT NOW</button>
                                <button class="add-btn" onclick='addToCart({id:"${id}", name:"${p.name}", price:${p.price}, image:"${images[0]}"})'>
                                    <i class="fas fa-shopping-bag"></i>
                                </button>
                            </div>
                            <a href="${waLink}" target="_blank" class="whatsapp-btn">
                                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
                            </a>
                        </div>
                    </div>
                `;

                // Handle Variants Logic
                if(p.variants && p.variants.length > 0) {
                    document.getElementById('variation-wrapper').style.display = 'block';
                    const list = document.getElementById('variant-list');
                    p.variants.forEach(v => {
                        const b = document.createElement('button');
                        b.className = 'variant-btn';
                        b.innerText = v.color;
                        b.onclick = () => {
                            document.querySelectorAll('.variant-btn').forEach(btn => {
                                btn.style.borderColor = '#ddd';
                                btn.style.color = '#333';
                            });
                            b.style.borderColor = '#b76e79';
                            b.style.color = '#b76e79';
                            window.selectedVariant = v.color;
                            if(v.price) document.getElementById('mainPrice').innerText = "₹" + v.price;
                        };
                        list.appendChild(b);
                    });
                }

                loadSimilar(p.category, id);
            }
        }

        async function loadSimilar(cat, currentId) {
            const q = query(collection(db, "products"), where("category", "==", cat), limit(5));
            const snap = await getDocs(q);
            const container = document.getElementById('similar-list');
            container.innerHTML = "";

            snap.forEach((doc) => {
                const item = doc.data();
                if(doc.id !== currentId) {
                    const img = item.images ? item.images[0] : item.image;
                    container.innerHTML += `
                        <a href="product-detail.html?id=${doc.id}" class="s-card">
                            <img src="${img}">
                            <div class="s-info">
                                <p style="font-weight:600; margin:0;">${item.name}</p>
                                <p style="color:#b76e79; font-weight:700; margin-top:5px;">₹${item.price}</p>
                            </div>
                        </a>
                    `;
                }
            });
        }

        getProduct();
    </script>
</body>
</html>
