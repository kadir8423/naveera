<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Naveera Banaras</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #b76e79; --text: #222; --border: #ececec; }
        body { margin:0; font-family: 'Montserrat', sans-serif; background:#fff; color: var(--text); overflow-x: hidden; }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }
        a { text-decoration:none; color:inherit; }

        /* --- NAVIGATION --- */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2000; height: 80px; }
        .logo { font-size: 30px; font-weight: 700; letter-spacing: 2px; }

        /* --- PRODUCT LAYOUT --- */
        .product-container { display: flex; max-width: 1400px; margin: 0 auto; gap: 40px; padding: 40px; }
        
        /* Image Selection Logic */
        .image-section { flex: 1.2; display: flex; gap: 15px; align-items: flex-start; position: sticky; top: 120px; }
        .thumbnail-col { display: flex; flex-direction: column; gap: 10px; width: 80px; }
        .thumb-img { width: 100%; height: 100px; object-fit: cover; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; opacity: 0.6; }
        .thumb-img.active { border-color: #000; opacity: 1; }
        .main-display { flex: 1; }
        .main-display img { width: 100%; height: 750px; object-fit: cover; background: #f9f9f9; }

        .info-section { flex: 0.8; }
        .breadcrumb { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 15px; }
        .p-title { font-size: 32px; font-weight: 400; line-height: 1.2; margin-bottom: 10px; }
        .price-row { margin: 20px 0; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .p-price { font-size: 24px; font-weight: 500; }
        .p-old { text-decoration: line-through; color: #999; font-size: 18px; margin-left: 10px; }
        .tax-info { font-size: 12px; color: #666; display: block; margin-top: 5px; }

        .action-btns { display: flex; flex-direction: column; gap: 12px; margin: 30px 0; }
        .btn { padding: 18px; border-radius: 0; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 13px; border: 1px solid #000; }
        .add-bag { background: #fff; color: #000; }
        .add-bag:hover { background: #000; color: #fff; }
        .buy-now { background: #000; color: #fff; }

        .details-accordion { border-top: 1px solid var(--border); margin-top: 40px; }
        .acc-item { border-bottom: 1px solid var(--border); }
        .acc-btn { width: 100%; padding: 20px 0; background: none; border: none; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: 'Playfair Display'; font-size: 18px; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s ease; font-size: 14px; line-height: 1.8; color: #555; }
        .acc-item.active .acc-content { max-height: 1000px; padding-bottom: 20px; }

        /* --- SLIDERS & GRIDS --- */
        .slider-section { padding: 60px 40px; max-width: 1400px; margin: auto; position: relative; }
        .section-title { text-align: center; font-size: 28px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        .h-slider-wrapper { position: relative; display: flex; align-items: center; }
        .h-slider { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; padding: 10px 0; }
        .h-slider::-webkit-scrollbar { display: none; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: #fff; border: 1px solid #000; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .prev-btn { left: -20px; }
        .next-btn { right: -20px; }

        .slide-card { min-width: 300px; cursor: pointer; transition: 0.3s; }
        .slide-card img { width: 100%; height: 400px; object-fit: cover; }
        .slide-meta { padding: 15px 0; text-align: center; }
        
        /* Auto Scroll Track */
        .auto-track { display: flex; gap: 20px; animation: scrollLeft 30s linear infinite; width: max-content; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .purchased-tag { font-size: 11px; color: #28a745; font-weight: 600; margin-top: 5px; }

        /* Footer */
        footer { background: #111; color: #fff; padding: 60px 50px; margin-top: 80px; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 50px; max-width: 1400px; margin: auto; }
        
        @media (max-width: 1024px) {
            .product-container { flex-direction: column; }
            .image-section { flex-direction: column-reverse; position: static; }
            .thumbnail-col { flex-direction: row; width: 100%; overflow-x: auto; }
            .main-display img { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="logo">NAVEERA</a>
        <div style="display: flex; gap: 30px; align-items: center;">
            <a href="index.html" style="font-size: 12px; letter-spacing: 1px;">COLLECTIONS</a>
            <i class="fa fa-shopping-bag" style="cursor: pointer;" onclick="location.href='cart.html'"></i>
        </div>
    </div>

    <div class="product-container" id="product-root">
        <p style="text-align: center; width: 100%; padding: 100px;">Loading...</p>
    </div>

    <div class="slider-section">
        <h2 class="section-title">You May Also Like</h2>
        <div class="h-slider-wrapper">
            <button class="nav-btn prev-btn" onclick="slide('like-list', -1)"><i class="fas fa-chevron-left"></i></button>
            <div class="h-slider" id="like-list"></div>
            <button class="nav-btn next-btn" onclick="slide('like-list', 1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="slider-section" style="background: #fafafa;">
        <h2 class="section-title">Our Best Sellers</h2>
        <div class="h-slider-wrapper">
            <button class="nav-btn prev-btn" onclick="slide('best-list', -1)"><i class="fas fa-chevron-left"></i></button>
            <div class="h-slider" id="best-list"></div>
            <button class="nav-btn next-btn" onclick="slide('best-list', 1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <div class="slider-section" style="overflow: hidden;">
        <h2 class="section-title">Recent Concept Purchases</h2>
        <div class="auto-track" id="recent-track"></div>
    </div>

    <footer>
        <div class="footer-grid">
            <div><h2 class="logo">NAVEERA</h2><p style="color:#888;">Directly from the looms of Banaras to your doorstep.</p></div>
            <div><h4>Support</h4><p>About Us</p><p>Shipping Policy</p></div>
            <div><h4>Contact</h4><p>+91 6386885929</p></div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKKtWZYnGOIK4vcKCwaNohBsEGSyXF0iA",
            authDomain: "naveera-e82ab.firebaseapp.com",
            projectId: "naveera-e82ab",
            storageBucket: "naveera-e82ab.firebasestorage.app",
            messagingSenderId: "531422327110",
            appId: "1:531422327110:web:90d3092ec932fbb3643547"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Functions
        window.toggleAcc = (el) => el.parentElement.classList.toggle('active');
        window.slide = (id, dir) => document.getElementById(id).scrollBy({ left: dir * 320, behavior: 'smooth' });
        window.changeMainImg = (src, el) => {
            document.getElementById('mainImg').src = src;
            document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        async function getProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;
            
            const snap = await getDoc(doc(db, "products", id));
            if (snap.exists()) {
                const p = snap.data();
                const images = p.images || [p.image];
                
                const thumbs = images.map((img, i) => `<img src="${img}" class="thumb-img ${i==0?'active':''}" onclick="changeMainImg('${img}', this)">`).join('');

                document.getElementById('product-root').innerHTML = `
                    <div class="image-section">
                        <div class="thumbnail-col">${thumbs}</div>
                        <div class="main-display"><img src="${images[0]}" id="mainImg"></div>
                    </div>
                    
                    <div class="info-section">
                        <div class="breadcrumb">Handloom / ${p.category}</div>
                        <h1 class="p-title">${p.name}</h1>
                        <div class="price-row">
                            <span class="p-price">₹${p.price}</span>
                            ${p.oldPrice ? `<span class="p-old">₹${p.oldPrice}</span>` : ""}
                            <span class="tax-info">MRP incl. of all taxes</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn add-bag">Add to Bag</button>
                            <button class="btn buy-now" onclick="location.href='checkout.html?id=${id}'">Buy It Now</button>
                        </div>
                        <div class="details-accordion">
                            <div class="acc-item active"><button class="acc-btn" onclick="toggleAcc(this)">Description <span>+</span></button>
                            <div class="acc-content">${p.description}</div></div>
                            <div class="acc-item"><button class="acc-btn" onclick="toggleAcc(this)">Fabric & Care <span>+</span></button>
                            <div class="acc-content">${p.fabric || 'Pure Banarasi Silk. Dry Clean Only.'}</div></div>
                        </div>
                    </div>`;
                loadExtraSections();
            }
        }

        async function loadExtraSections() {
            const snap = await getDocs(collection(db, "products"));
            const list = [];
            snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
            const names = ["Anjali - Delhi", "Priya - Mumbai", "Sana - Lucknow", "Ritu - Varanasi", "Megha - Jaipur"];

            const card = (item, tag = "") => `
                <div class="slide-card" onclick="location.href='product-detail.html?id=${item.id}'">
                    <img src="${item.images ? item.images[0] : item.image}">
                    <div class="slide-meta">
                        <div style="font-size:12px; letter-spacing:1px; margin-bottom:5px;">${item.name}</div>
                        <div style="font-weight:600">₹${item.price}</div>
                        ${tag}
                    </div>
                </div>`;

            document.getElementById('like-list').innerHTML = list.slice(0, 8).map(i => card(i)).join('');
            document.getElementById('best-list').innerHTML = list.reverse().slice(0, 8).map(i => card(i)).join('');
            
            // Auto Track (Duplicate for infinite effect)
            const recentHtml = list.slice(0, 6).map((i, idx) => card(i, `<div class="purchased-tag"><i class="fas fa-check-circle"></i> Purchased by ${names[idx%5]}</div>`)).join('');
            document.getElementById('recent-track').innerHTML = recentHtml + recentHtml;
        }
        
        getProduct();
    </script>
</body>
</html>
