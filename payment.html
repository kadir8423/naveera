<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 { text-align: center; }

.product-box {
    display: flex;
    gap: 20px;
    align-items: center;
    border-bottom: 1px solid #ddd;
    padding-bottom: 15px;
}

.product-box img {
    width: 120px;
    border-radius: 8px;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 15px;
    text-align: right;
}

.select-box {
    margin-top: 20px;
}

select, input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.pay-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #b76e79;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <h1>Checkout</h1>

    <div id="product"></div>

    <div class="total" id="total"></div>

    <div class="select-box">
        <h3>Customer Details</h3>
        <input type="text" placeholder="Full Name" id="name">
        <input type="text" placeholder="Address" id="address">
        <input type="text" placeholder="Mobile Number" id="phone">
    </div>

    <div class="select-box">
        <h3>Payment Method</h3>
        <select id="method">
            <option>Cash on Delivery</option>
            <option>UPI (Demo)</option>
            <option>Credit/Debit Card (Demo)</option>
        </select>
    </div>

    <button class="pay-btn" onclick="payNow()">Place Order</button>

</div>

<script>
const product = JSON.parse(localStorage.getItem("buyNowProduct"));

if(product){
    document.getElementById("product").innerHTML = `
        <div class="product-box">
            <img src="${product.img}">
            <div>
                <h3>${product.name}</h3>
                <p>Price: ₹${product.price}</p>
                <p>Quantity: ${product.quantity}</p>
            </div>
        </div>
    `;

    document.getElementById("total").innerText =
        "Total: ₹" + (product.price * product.quantity);
}

// PAYMENT FUNCTION
function payNow(){
    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;
    const method = document.getElementById("method").value;

    if(!name || !address || !phone){
        alert("Please fill all details!");
        return;
    }

    alert("✅ Order Placed Successfully!\nPayment Method: " + method);

    localStorage.removeItem("buyNowProduct");

    window.location.href = "salwar-shop.html";
}
</script>

</body>
</html>
