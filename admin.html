<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naveera Admin | Inventory & Copy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDKKtWZYnGOIK4vcKCwaNohBsEGSyXF0iA",
    authDomain: "naveera-e82ab.firebaseapp.com",
    projectId: "naveera-e82ab",
    storageBucket: "naveera-e82ab.firebasestorage.app",
    messagingSenderId: "531422327110",
    appId: "1:531422327110:web:90d3092ec932fbb3643547"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let editMode = false;
  let currentEditId = null;

  // --- 1. SAVE PRODUCT ---
  window.saveProduct = async function(e) {
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const price = Number(document.getElementById("price").value);
    const oldPrice = document.getElementById("oldPrice").value ? Number(document.getElementById("oldPrice").value) : null;
    const category = document.getElementById("category").value;
    const stock = Number(document.getElementById("stock").value);
    const description = document.getElementById("description").value.trim();
    const isDeal = document.getElementById("isDeal").checked;
    const bulletPoints = document.getElementById("bulletPoints").value.trim().split('\n').filter(p => p !== "");

    const images = [
        document.getElementById("img1").value.trim(),
        document.getElementById("img2").value.trim(),
        document.getElementById("img3").value.trim(),
        document.getElementById("img4").value.trim()
    ].filter(url => url !== "");

    if (!name || !price || images.length === 0 || !category) {
        alert("Bhai, Name, Price, Category aur kam se kam 1 Image zaroori hai!");
        return;
    }

    const productData = {
        name, price, oldPrice, images, category, stock, description, isDeal,
        features: bulletPoints,
        timestamp: new Date()
    };

    try {
        if (editMode) {
            await updateDoc(doc(db, "products", currentEditId), productData);
            alert("Guru, Product update ho gaya! ✅");
            resetForm();
        } else {
            await addDoc(collection(db, "products"), productData);
            alert("Guru, Naya Product add ho gaya! 🚀");
            resetForm();
        }
        fetchProducts(); 
    } catch (err) {
        alert("Error: " + err.message);
    }
  }

  // --- 2. FETCH LISTINGS ---
  async function fetchProducts() {
    const listDiv = document.getElementById("productList");
    listDiv.innerHTML = "<p style='text-align:center;'>Inventory load ho rahi hai...</p>";
    
    try {
        const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
        const snapshot = await getDocs(q);
        listDiv.innerHTML = ""; 

        snapshot.forEach((pDoc) => {
            const data = pDoc.data();
            const id = pDoc.id;
            const mainImg = data.images && data.images[0] ? data.images[0] : '';

            listDiv.innerHTML += `
                <div class="product-item">
                    <div style="display:flex; align-items:center; gap: 15px;">
                        <img src="${mainImg}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <strong>${data.name}</strong> <small>(${data.category})</small>
                            <br>
                            <span style="color:#b76e79; font-weight:bold;">₹${data.price}</span> | Stock: ${data.stock}
                        </div>
                    </div>
                    <div class="action-btns">
                        <button onclick="copyProduct('${id}')" class="btn-copy"><i class="fas fa-copy"></i> Copy</button>
                        <button onclick="prepareEdit('${id}', ${JSON.stringify(data).replace(/"/g, '&quot;')})" class="btn-edit">Edit</button>
                        <button onclick="deleteProduct('${id}')" class="btn-delete">Delete</button>
                    </div>
                </div>
            `;
        });
    } catch (error) { listDiv.innerHTML = "Error loading products."; }
  }

  // --- 3. COPY PRODUCT LOGIC ---
  window.copyProduct = async function(id) {
    try {
        const docRef = doc(db, "products", id);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            
            // Reset form first
            resetForm();

            // Fill basic info (Naming it "Copy of..." for clarity)
            document.getElementById("name").value = "Copy of " + data.name;
            document.getElementById("price").value = data.price;
            document.getElementById("oldPrice").value = data.oldPrice || "";
            document.getElementById("category").value = data.category;
            document.getElementById("stock").value = data.stock;
            document.getElementById("description").value = data.description || "";
            document.getElementById("isDeal").checked = data.isDeal || false;
            document.getElementById("bulletPoints").value = data.features ? data.features.join('\n') : "";
            
            // Keep images empty for new entry
            document.getElementById("img1").focus();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert("Bhai, Details copy ho gayi hain! Bas nayi images daalein aur List kar dein. ✨");
        }
    } catch (err) { alert("Copy karne mein error: " + err.message); }
  }

  // --- 4. EDIT & DELETE ---
  window.prepareEdit = function(id, data) {
    editMode = true;
    currentEditId = id;
    document.getElementById("form-title").innerText = "Edit Product Mode";
    document.getElementById("submit-btn").innerText = "Update Product Info";
    document.getElementById("cancel-edit").style.display = "block";

    document.getElementById("name").value = data.name;
    document.getElementById("price").value = data.price;
    document.getElementById("oldPrice").value = data.oldPrice || "";
    document.getElementById("category").value = data.category;
    document.getElementById("stock").value = data.stock;
    document.getElementById("description").value = data.description;
    document.getElementById("isDeal").checked = data.isDeal;
    document.getElementById("bulletPoints").value = data.features ? data.features.join('\n') : "";
    
    document.getElementById("img1").value = data.images[0] || "";
    document.getElementById("img2").value = data.images[1] || "";
    document.getElementById("img3").value = data.images[2] || "";
    document.getElementById("img4").value = data.images[3] || "";

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.resetForm = function() {
    editMode = false;
    currentEditId = null;
    document.getElementById("productForm").reset();
    document.getElementById("form-title").innerText = "Add New Product";
    document.getElementById("submit-btn").innerText = "List Product On Naveera";
    document.getElementById("cancel-edit").style.display = "none";
  }

  window.deleteProduct = async function(id) {
    if(confirm("Pakka delete karna hai?")) {
        await deleteDoc(doc(db, "products", id));
        fetchProducts();
    }
  }

  fetchProducts();
</script>

<style>
  body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin:0; padding:20px; color: #333; }
  .container { max-width: 800px; margin: auto; background:white; padding:30px; border-radius:20px; box-shadow:0 15px 35px rgba(0,0,0,0.1);}
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .full-width { grid-column: span 2; }
  label { display:block; margin-top:10px; font-weight:600; font-size: 13px; color: #666; }
  input, select, textarea { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; outline: none; }
  input:focus { border-color: #b76e79; }
  .image-box { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 10px; }
  .deal-checkbox-container { grid-column: span 2; background: #fff5f6; padding: 12px; border-radius: 8px; border: 1px dashed #b76e79; display: flex; align-items: center; gap: 10px; }
  #submit-btn { margin-top:20px; padding:15px; background:#b76e79; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px; width:100%; font-weight: 600; }
  #cancel-edit { background: #666; margin-top: 10px; padding:10px; color:white; border:none; border-radius:8px; width:100%; cursor:pointer; }
  
  /* LISTING STYLE */
  .product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; }
  .img-preview { width: 55px; height: 55px; object-fit: contain; background: #f9f9f9; border-radius: 6px; }
  .action-btns { display: flex; gap: 8px; }
  .btn-copy { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn-edit { background: #4a90e2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
    <h1 id="form-title">Add New Product</h1>
    <form id="productForm" onsubmit="saveProduct(event)">
        <div class="form-grid">
            <div class="full-width">
                <label>Product Name *</label>
                <input type="text" id="name" required>
            </div>
            <div><label>Price (₹) *</label><input type="number" id="price" required></div>
            <div><label>Old Price (MRP)</label><input type="number" id="oldPrice"></div>
            <div>
                <label>Category *</label>
                <select id="category" required>
                    <option value="Saree">Saree</option>
                    <option value="Salwar Suit">Salwar Suit</option>
                    <option value="Dupatta">Dupatta</option>
                </select>
            </div>
            <div><label>Stock Qty *</label><input type="number" id="stock" value="1" required></div>
            <div class="deal-checkbox-container">
                <input type="checkbox" id="isDeal">
                <label for="isDeal" style="margin:0;">List in "Deal of the Week"</label>
            </div>
            <div class="full-width image-box">
                <label>Image URLs (Copying keeps these empty for new entry)</label>
                <input type="text" id="img1" placeholder="1. Main Image" style="margin-bottom:8px;">
                <input type="text" id="img2" placeholder="2. Side View" style="margin-bottom:8px;">
                <input type="text" id="img3" placeholder="3. Detail View" style="margin-bottom:8px;">
                <input type="text" id="img4" placeholder="4. Extra View">
            </div>
            <div class="full-width">
                <label>Description *</label>
                <textarea id="description" rows="3" required></textarea>
            </div>
            <div class="full-width">
                <label>Bullet Points (One per line)</label>
                <textarea id="bulletPoints" rows="3"></textarea>
            </div>
        </div>
        <button type="submit" id="submit-btn">List Product On Naveera</button>
        <button type="button" id="cancel-edit" onclick="resetForm()" style="display:none;">Cancel Edit</button>
    </form>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
    <h2>Live Inventory Status</h2>
    <div id="productList"></div>
</div>

</body>
</html>
