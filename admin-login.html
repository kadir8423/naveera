<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Naveera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --premium-gold: #b76e79; 
            --gold-accent: #b8860b;
            --bg-soft: #fdfaf7;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-soft); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-image: radial-gradient(#eee 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- LOGO STYLE (BAAKI PAGES JAISA) --- */
        .brand-identity { text-align: center; margin-bottom: 30px; }
        .logo-bold { 
            font-family: 'Playfair Display', serif;
            font-size: 32px; font-weight: 700; letter-spacing: 5px; 
            color: #000; display: block; line-height: 1; text-transform: uppercase; 
        }
        .logo-fashion { 
            font-family: 'Playfair Display', serif; font-size: 12px; 
            font-style: italic; letter-spacing: 6px; text-transform: uppercase; 
            color: var(--gold-accent); margin-top: 5px; display: block; 
        }

        .login-box { 
            background: white; padding: 50px 40px; border-radius: 4px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.08); 
            text-align: center; width: 100%; max-width: 380px; 
            border: 1px solid #f0f0f0;
        }

        h2 { font-family: 'Playfair Display', serif; color: #222; margin-bottom: 10px; font-weight: 400; font-style: italic; }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            border: 1px solid #eee; border-radius: 0; box-sizing: border-box; 
            text-align: center; font-size: 14px; letter-spacing: 2px;
            background: #fafafa; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--premium-gold); background: #fff; }

        button { 
            width: 100%; padding: 15px; background: #1a1a1a; 
            color: white; border: none; border-radius: 0; 
            cursor: pointer; font-weight: 600; font-size: 13px; 
            letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; 
        }
        button:hover { background: var(--premium-gold); letter-spacing: 3px; }

        .error { 
            color: #d9534f; font-size: 12px; margin-bottom: 15px; 
            display: none; font-weight: 500; letter-spacing: 0.5px;
        }

        .footer-text { margin-top: 30px; font-size: 11px; color: #999; letter-spacing: 1px; }

        @media (max-width: 480px) {
            .login-box { padding: 40px 25px; margin: 20px; }
            .logo-bold { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="login-box">
    <!-- LOGO CONSISTENCY -->
    <div class="brand-identity">
        <span class="logo-bold">NAVEERA</span>
        <span class="logo-fashion">Admin Portal</span>
    </div>

    <h2>Access Control</h2>
    <p style="color:#666; font-size: 13px; margin-bottom: 25px; letter-spacing: 0.5px;">Please enter your secret credentials</p>
    
    <div id="errorMsg" class="error">Galat password hai bhai! ❌</div>
    
    <input type="password" id="adminPass" placeholder="••••••••••••">
    <button onclick="checkLogin()">AUTHORIZE LOGIN</button>

    <div class="footer-text">© 2026 NAVEERA BANARAS</div>
</div>

<script>
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        const secret = "NAVEERA2026"; // <-- BHAI, APNA PASSWORD YAHAN BADAL LO

        if(pass === secret) {
            sessionStorage.setItem("adminLoggedIn", "true");
            window.location.href = "admin-orders.html"; // Sahi password par yahan jayega
        } else {
            const errorElement = document.getElementById('errorMsg');
            errorElement.style.display = 'block';
            // Simple shake effect for error
            document.querySelector('.login-box').style.transform = 'translateX(5px)';
            setTimeout(() => { document.querySelector('.login-box').style.transform = 'translateX(0)'; }, 100);
        }
    }

    // Enter key support for better UX
    document.getElementById('adminPass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkLogin();
        }
    });
</script>

</body>
</html>
