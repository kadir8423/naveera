<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Naveera</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { color: #b76e79; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #b76e79; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; }
        button:hover { background: #a35d68; }
        .error { color: red; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Naveera Admin</h2>
    <p style="color:#888; font-size: 14px;">Please enter your secret password</p>
    <div id="errorMsg" class="error">Galat password hai bhai! ❌</div>
    <input type="password" id="adminPass" placeholder="Enter Password">
    <button onclick="checkLogin()">LOGIN</button>
</div>

<script>
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        const secret = "NAVEERA2026"; // <-- BHAI, APNA PASSWORD YAHAN BADAL LO

        if(pass === secret) {
            sessionStorage.setItem("adminLoggedIn", "true");
            window.location.href = "admin-orders.html"; // Sahi password par yahan jayega
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>

</body>
</html>
